<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Name #1</title>
    <link rel="stylesheet" href="../../css/level.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>
    <div id="data_list">
        <div class="data_item">level<span id="level"> 1</span></div>
        <div class="data_item">$<span id="earn"></span></div>
        <div class="data_item"><img id="customerNum" src="../../img\customerNum.jpg" alt="guests number"><span
                id="n_guest"></span>/6</div>
        <div class="data_item">played time:<span id="time"></span>s</div>
    </div>
    <!-- <div style="height: 5vh;"></div> -->
    <div id="main">
        <div id="upstairs">
            <div class="flexContiner floor" id="floor2">
                <div class="flexBox up_item lift" id="lift_2" data-floor = "2">this is lift_2</div>
                <div class="flexBox flexContiner room_section">
                    <div class="room up_item interact_area" id="room_3"  data-floor = "2">this is room_3</div>
                    <div class="room up_item interact_area" id="room_4"  data-floor = "2">this is room_4</div>
                </div>
            </div>
            
            <div class="flexContiner floor" id="floor1">
                <div class="flexBox up_item lift" id="lift_1" data-floor = "1">this is lift_1</div>
                <div class="flexBox flexContiner room_section">
                    <div class="room up_item interact_area" id="room_1" data-floor = "1">this is room_1</div>
                    <div class="room up_item interact_area" id="room_2" data-floor = "1">this is room_2</div>
                </div>
            </div>
            <div class="flexBox up_item lift" id="lift_0" data-floor = "0">this is lift_0</div>
            <div class="flexContiner" id="ground">
                <div class="flexBox " id="waitting" data-floor = "0">this is waitting area</div>
                <div class="flexBox" id="object_section">
                    <div class="flexBox flexContiner">
                        <div class="flexBox g_item interact_item" id="food" data-floor = "0">this is food</div>
                        <div class="flexBox g_item interact_item" id="bin_rubbish" data-floor = "0">this is bin_rubbish</div>
                        <div class="flexBox g_item interact_item" id="bin_recycle" data-floor = "0">this is bin_recycle</div>
                    </div>
                    <div class="flexBox flexContiner">
                        <div class="flexBox g_item">this is table</div>
                        <div class="flexBox g_item">this is table</div>
                        <div class="flexBox g_item">this is table</div>
                    </div>
                </div>
            </div>
            <div id="mainCharacterandTrolley">
            <div id = "mainCharacter" data-floor = "0"></div>
            <div id = "trolley" data-floor = "0"></div>
            </div>
            <div class="stop">Stop</div>

        </div>
<script src="../../js/level.js"></script>
</body>

</htmljb
