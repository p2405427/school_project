<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Name[Done]</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/done.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>
    <div class="strongTitle title">Complete level</div>
    <div id="main">
        <div class="flexContainer">
            <div class="flexBox_img">
                <img class="role" src="..\img\avatar.jpg" alt="role image">
                <div style="display: none;" class="button" id="shop"><a href="">change your role image</a></div>
            </div>
            <div class="flexBox_text">
                <div class="result">  Total Savings: $<span id="totalSaving"></span></div>
                <div class="result"> Total income: $<span id="earn"></span></div>
                <div class="result"> customer served: <span id="guestCount"></span></div>
                <div class="result"> used time: <span id="time"></span>s</div>
            </div>
        <div class="flexContainer">
            <a id = "retry" href=""><div class="button done_button">Retry</div></a>
            <a href="levelMap.html"><div class="button done_button">Map</div></a>
            <a id = "next" href=""><div class="button done_button">Next</div></a>
        </div>
        </div>
    </div>
    <script src="./../js/done.js"></script>
</body>
</html>
